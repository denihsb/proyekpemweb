<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelajahi — ArtLocal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────── -->
<nav class="nav scrolled" id="mainNav">
  <div class="container nav__inner">
    <a href="index.html" class="nav__logo">ArtLocal<span class="nav__logo-dot"></span></a>
    <ul class="nav__links">
      <li><a href="explore.html" style="color:var(--cream)">Jelajahi</a></li>
    </ul>
    <div class="nav__actions">
      <a href="auth.html" class="btn btn--ghost" data-guest>Masuk</a>
      <a href="auth.html#register" class="btn btn--primary" data-guest>Daftar</a>
      <a href="upload.html" class="btn btn--outline" data-auth style="display:none">Upload</a>
      <a href="profile.html" class="btn btn--ghost" data-auth style="display:none" data-username>Profil</a>
    </div>
  </div>
</nav>

<!-- ── Page Header ─────────────────────────────────────── -->
<div style="padding-top:calc(var(--nav-h) + 3rem);padding-bottom:2rem;border-bottom:1px solid var(--border);">
  <div class="container">
    <p class="label" style="margin-bottom:0.75rem">Galeri</p>
    <h1 style="font-size:clamp(2.5rem,5vw,5rem)">Jelajahi Karya</h1>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────── -->
<section style="padding-top:2.5rem;">
  <div class="container">

    <!-- Filter Bar -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-cat="all" onclick="filterBy('all')">Semua</button>
      <button class="filter-btn" data-cat="illustration" onclick="filterBy('illustration')">Ilustrasi</button>
      <button class="filter-btn" data-cat="photography" onclick="filterBy('photography')">Fotografi</button>
      <button class="filter-btn" data-cat="digital" onclick="filterBy('digital')">Digital Art</button>
      <button class="filter-btn" data-cat="painting" onclick="filterBy('painting')">Lukisan</button>
      <button class="filter-btn" data-cat="sketch" onclick="filterBy('sketch')">Sketsa</button>
      <button class="filter-btn" data-cat="traditional" onclick="filterBy('traditional')">Seni Tradisional</button>
      <button class="filter-btn" data-cat="other" onclick="filterBy('other')">Lainnya</button>
    </div>

    <!-- Grid -->
    <div class="masonry" id="artGrid">
      <div style="text-align:center;padding:5rem;color:var(--cream-dim);">
        <span class="loader"></span>
      </div>
    </div>

    <!-- Load More -->
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn btn--outline" id="loadMoreBtn" onclick="loadMore()">Muat Lebih Banyak</button>
    </div>

  </div>
</section>

<!-- ── Footer ──────────────────────────────────────────── -->
<footer class="footer">
  <div class="container footer__inner">
    <span class="footer__logo">ArtLocal</span>
    <span class="footer__copy">© 2025 ArtLocal</span>
  </div>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { initCursor, initScrollReveal, initGrain, initPageTransition } from './js/cursor.js';
import { watchAuth, syncNavAuth } from './js/auth.js';
import { fetchArtworks, renderArtGrid } from './js/gallery.js';

initCursor();
initScrollReveal();
initGrain();
initPageTransition();

watchAuth(user => syncNavAuth(user));

let currentCat = 'all';
let isLoading = false;
let hasMore = true;

const grid = document.getElementById('artGrid');
const loadMoreWrap = document.getElementById('loadMoreWrap');

// Check URL param
const urlCat = new URLSearchParams(window.location.search).get('cat');
if (urlCat) {
  currentCat = urlCat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === urlCat);
  });
}

async function loadArtworks(reset = false) {
  if (isLoading) return;
  isLoading = true;

  if (reset) {
    grid.innerHTML = '<div style="text-align:center;padding:5rem;color:var(--cream-dim);"><span class="loader"></span></div>';
    loadMoreWrap.style.display = 'none';
  }

  try {
    const artworks = await fetchArtworks(reset, currentCat === 'all' ? null : currentCat);
    renderArtGrid(artworks, grid, !reset);
    hasMore = artworks.length === 12;
    loadMoreWrap.style.display = hasMore ? 'flex' : 'none';
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--cream-dim);text-align:center;padding:3rem;">Gagal memuat karya.</p>';
  } finally {
    isLoading = false;
  }
}

window.filterBy = (cat) => {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  loadArtworks(true);
};

window.loadMore = () => loadArtworks(false);

loadArtworks(true);
</script>
</body>
</html>
