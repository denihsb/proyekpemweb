<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk / Daftar — ArtLocal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">

  <!-- ── Left Visual ─────────────────────────────────────── -->
  <div class="auth-visual">
    <div class="auth-visual__bg"></div>
    <div class="auth-visual__quote" data-reveal>
      <blockquote>
        "Seni adalah cara kita menyentuh jiwa orang lain tanpa menyentuh tubuh mereka."
      </blockquote>
      <cite>— Komunitas ArtLocal</cite>
    </div>
  </div>

  <!-- ── Right Form ──────────────────────────────────────── -->
  <div class="auth-form-side">
    <div class="auth-box">
      <div class="auth-box__logo">
        Art<span>Local</span><span style="color:var(--accent)">.</span>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Daftar</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="formLogin">
        <div id="loginError" class="form-error" style="display:none"></div>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="kamu@email.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="button" class="btn btn--primary" id="loginBtn" style="width:100%;justify-content:center;margin-top:0.5rem">
          Masuk
        </button>
        <p style="text-align:center;margin-top:1.5rem;font-size:0.82rem;color:var(--cream-dim)">
          Belum punya akun?
          <button type="button" onclick="switchTab('register')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:inherit">Daftar</button>
        </p>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="formRegister">
        <div id="registerError" class="form-error" style="display:none"></div>
        <div id="registerSuccess" class="form-success" style="display:none"></div>
        <div class="form-group">
          <label for="regName">Nama / Username</label>
          <input type="text" id="regName" class="form-input" placeholder="Nama seniman kamu" required>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="kamu@email.com" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Min. 6 karakter" required>
        </div>
        <button type="button" class="btn btn--primary" id="registerBtn" style="width:100%;justify-content:center;margin-top:0.5rem">
          Buat Akun
        </button>
        <p style="text-align:center;margin-top:1.5rem;font-size:0.82rem;color:var(--cream-dim)">
          Sudah punya akun?
          <button type="button" onclick="switchTab('login')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:inherit">Masuk</button>
        </p>
      </div>

      <!-- Verification Form -->
      <div class="auth-form" id="formVerify">
        <div style="text-align:center;margin-bottom:2rem">
          <h3 style="font-size:1.3rem;margin-bottom:0.5rem;color:var(--accent)">Verifikasi Email</h3>
          <p style="font-size:0.9rem;color:var(--cream-dim)">Kami sudah kirim kode verifikasi ke email kamu. Salin kode 6 digit dari email.</p>
        </div>
        <div id="verifyInfo" style="background:rgba(255,255,255,0.05);padding:1rem;border-radius:0.5rem;margin-bottom:1rem;font-size:0.9rem;color:var(--cream-dim)">
          Email: <strong id="verifyEmailDisplay"></strong>
        </div>
        <div class="form-group">
          <label for="verifyCode">Kode Verifikasi (6 digit)</label>
          <input type="text" id="verifyCode" class="form-input" placeholder="Contoh: 123456" maxlength="6" inputmode="numeric">
        </div>
        <button type="button" class="btn btn--primary" id="verifyCodeBtn" style="width:100%;justify-content:center;margin-top:0.5rem;margin-bottom:0.5rem">
          Verifikasi
        </button>
        <button type="button" class="btn btn--outline" id="resendVerifyBtn" style="width:100%;justify-content:center">
          Kirim Ulang Kode
        </button>
        <p style="text-align:center;margin-top:1.5rem;font-size:0.82rem;color:var(--cream-dim)">
          <button type="button" onclick="switchTab('login')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:inherit">Kembali ke Login</button>
        </p>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initCursor, initGrain, initPageTransition } from './js/cursor.js';
import { loginUser, registerUser, watchAuth, isEmailVerified, refreshEmailStatus, resendVerificationEmail } from './js/auth.js';

initCursor();
initGrain();
initPageTransition();

// Redirect if already logged in and verified
watchAuth(user => {
  if (user && user.emailVerified) window.location.href = 'profile.html';
});

window.switchTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
  document.getElementById(`form${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
};

// Check hash
if (window.location.hash === '#register') switchTab('register');

window.handleLogin = async () => {
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;

  if (!email || !pass) { showError(errEl, 'Isi semua field dulu.'); return; }

  btn.disabled = true;
  btn.textContent = 'Memproses...';
  errEl.style.display = 'none';

  try {
    const user = await loginUser(email, pass);
    window.location.href = 'profile.html';
  } catch (e) {
    showError(errEl, translateError(e.code));
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
};

window.handleRegister = async () => {
  const btn = document.getElementById('registerBtn');
  const errEl = document.getElementById('registerError');
  const sucEl = document.getElementById('registerSuccess');
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPassword').value;

  if (!name || !email || !pass) { showError(errEl, 'Isi semua field dulu.'); return; }
  if (pass.length < 6) { showError(errEl, 'Password minimal 6 karakter.'); return; }

  btn.disabled = true;
  btn.textContent = 'Membuat akun...';
  errEl.style.display = 'none';

  try {
    const user = await registerUser(name, email, pass);
    sucEl.textContent = 'Akun berhasil dibuat! Mengalihkan...';
    sucEl.style.display = 'block';
    setTimeout(() => window.location.href = 'profile.html', 1500);
  } catch (e) {
    showError(errEl, translateError(e.code));
    btn.disabled = false;
    btn.textContent = 'Buat Akun';
  }
};

window.handleCheckVerify = async () => {
  const btn = document.getElementById('checkVerifyBtn');
  const statusEl = document.getElementById('autoCheckStatus');
  btn.disabled = true;
  btn.textContent = 'Memeriksa...';
  statusEl.style.display = 'none';

  try {
    const verified = await refreshEmailStatus();
    if (verified) {
      btn.textContent = 'Email Terverifikasi! Mengalihkan...';
      stopAutoCheckVerification();
      setTimeout(() => window.location.href = 'profile.html', 1500);
    } else {
      btn.textContent = 'Belum Terverifikasi';
      btn.disabled = false;
      statusEl.style.display = 'block';
      setTimeout(() => {
        btn.textContent = 'Sudah Verifikasi? Lanjut';
      }, 2000);
    }
  } catch (e) {
    btn.textContent = 'Gagal Memeriksa';
    btn.disabled = false;
    statusEl.style.display = 'none';
  }
};

let verifyCheckInterval = null;

window.startAutoCheckVerification = () => {
  stopAutoCheckVerification(); // Clear existing interval
  const statusEl = document.getElementById('autoCheckStatus');
  statusEl.style.display = 'block';
  
  // Auto-check every 5 seconds
  verifyCheckInterval = setInterval(async () => {
    try {
      const verified = await refreshEmailStatus();
      if (verified) {
        const btn = document.getElementById('checkVerifyBtn');
        btn.textContent = 'Email Terverifikasi! Mengalihkan...';
        btn.disabled = true;
        stopAutoCheckVerification();
        setTimeout(() => window.location.href = 'profile.html', 1500);
      }
    } catch (e) {
      console.error('Auto-check verification failed:', e);
    }
  }, 5000);
};

window.stopAutoCheckVerification = () => {
  if (verifyCheckInterval) {
    clearInterval(verifyCheckInterval);
    verifyCheckInterval = null;
  }
  const statusEl = document.getElementById('autoCheckStatus');
  statusEl.style.display = 'none';
};

window.handleResendVerify = async () => {
  const btn = document.getElementById('resendVerifyBtn');
  btn.disabled = true;
  btn.textContent = 'Mengirim...';

  try {
    await resendVerificationEmail();
    btn.textContent = 'Email Sudah Dikirim!';
    setTimeout(() => {
      btn.textContent = 'Kirim Ulang Email';
      btn.disabled = false;
    }, 3000);
  } catch (e) {
    btn.textContent = 'Gagal Mengirim';
    btn.disabled = false;
  }
};

function showError(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('registerBtn').addEventListener('click', handleRegister);
document.getElementById('checkVerifyBtn').addEventListener('click', handleCheckVerify);
document.getElementById('resendVerifyBtn').addEventListener('click', handleResendVerify);

function translateError(code) {
  const map = {
    'auth/email-already-in-use': 'Email sudah terdaftar.',
    'auth/invalid-email': 'Format email tidak valid.',
    'auth/user-not-found': 'Email tidak ditemukan.',
    'auth/wrong-password': 'Password salah.',
    'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.',
    'auth/weak-password': 'Password terlalu lemah.'
  };
  return map[code] || 'Terjadi kesalahan. Coba lagi.';
}
</script>
</body>
</html>
