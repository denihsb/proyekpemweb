<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — ArtLocal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────── -->
<nav class="nav scrolled">
  <div class="container nav__inner">
    <a href="index.html" class="nav__logo">ArtLocal<span class="nav__logo-dot"></span></a>
    <div class="nav__actions">
      <a href="upload.html" class="btn btn--outline" data-auth style="display:none">Upload Karya</a>
      <button class="btn btn--ghost" id="logoutBtn" style="display:none" onclick="handleLogout()">Keluar</button>
    </div>
  </div>
</nav>

<!-- ── Gate ────────────────────────────────────────────── -->
<div id="authGate" style="display:none;min-height:100dvh;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;text-align:center;padding:2rem;">
  <h2>Login dulu yuk</h2>
  <a href="auth.html" class="btn btn--primary">Masuk / Daftar</a>
</div>

<!-- ── Profile Content ─────────────────────────────────── -->
<div class="profile-page" id="profileContent" style="display:none">
  <div class="profile-header">
    <div class="container">
      <div class="profile-header__inner">
        <div class="profile-avatar" id="profileAvatar" style="cursor:pointer">?</div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">      
        <div class="profile-info">
          <h1 class="profile-info__name" id="profileName">—</h1>
          <p class="profile-info__bio" id="profileBio">Belum ada bio.</p>
          <div class="profile-info__meta">
            <div class="profile-meta__item">
              <span class="profile-meta__num" id="artworkCount">0</span>
              <span class="profile-meta__label">Karya</span>
            </div>
          </div>
          <div style="margin-top:1.5rem;display:flex;gap:1rem;flex-wrap:wrap">
            <button class="btn btn--outline" id="editToggleBtn" onclick="toggleEdit()">Edit Profil</button>
          </div>
        </div>
      </div>

      <!-- Edit Form (hidden by default) -->
      <div id="editForm" style="display:none;margin-top:2rem;max-width:480px">
        <div class="divider"></div>
        <div class="form-group">
          <label for="editBio">Bio</label>
          <textarea id="editBio" class="form-input" rows="3" placeholder="Ceritakan tentang dirimu..."></textarea>
        </div>
        <div style="display:flex;gap:1rem">
          <button class="btn btn--primary" onclick="saveBio()">Simpan</button>
          <button class="btn btn--ghost" onclick="toggleEdit()">Batal</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Email Verification Warning -->
  <div id="unverifiedBanner" style="display:none;background:#ffa500;color:white;padding:1rem;margin:1rem 0;border-radius:0.5rem;text-align:center">
    <strong>⚠️ Email Belum Diverifikasi</strong>
    <p style="font-size:0.9rem;margin:0.5rem 0">Verifikasi email untuk akses fitur lengkap</p>
    <button onclick="resendVerificationEmailClick()" style="background:white;color:#ffa500;border:none;padding:0.5rem 1rem;border-radius:0.3rem;cursor:pointer;font-weight:bold">Kirim Email Verifikasi</button>
  </div>

  <!-- Artworks -->
  <div class="container">
    <div class="section-header">
      <div style="display:flex;gap:1rem;align-items:center">
        <h2 id="tabMyArt" style="cursor:pointer">Karya Saya</h2>
        <h2 id="tabLiked" style="cursor:pointer;opacity:0.5">❤️ Disukai</h2>
      </div>
      <a href="upload.html" class="btn btn--primary">+ Upload Baru</a>
    </div>
    <div class="masonry" id="myArtGrid">
      <div style="text-align:center;padding:3rem;color:var(--cream-dim);">
        <span class="loader"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { initCursor, initGrain, initPageTransition } from './js/cursor.js';
import { watchAuth, logoutUser, getUserProfile, syncNavAuth, ensureUserProfile, isEmailVerified, resendVerificationEmail } from './js/auth.js';
import { fetchUserArtworks, renderArtGrid } from './js/gallery.js';
import { doc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { db } from './js/firebase-config.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { fetchArtwork } from './js/gallery.js';

initCursor();
initGrain();
initPageTransition();

let currentUser = null;
let targetUid = null;

const urlParams = new URLSearchParams(window.location.search);
const profileUid = urlParams.get('uid');
const avatar = document.getElementById('profileAvatar');
const avatarInput = document.getElementById('avatarInput');

avatar.onclick = () => {
  avatarInput.click();
};

watchAuth(async user => {
  syncNavAuth(user);
  if (!user && !profileUid) {
    document.getElementById('authGate').style.display = 'flex';
    document.getElementById('profileContent').style.display = 'none';
    return;
  }

  currentUser = user;
  await ensureUserProfile(user);
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('profileContent').style.display = 'block';
  document.getElementById('logoutBtn').style.display = '';

  // 🔥 SEMBUNYIKAN EDIT JIKA LIHAT PROFILE ORANG LAIN
if (profileUid && profileUid !== user.uid) {
  document.getElementById('editToggleBtn').style.display = 'none';
  document.querySelector('[href="upload.html"]').style.display = 'none';
}

  // Show warning jika email belum diverifikasi
  if (!user.emailVerified) {
    document.getElementById('unverifiedBanner').style.display = 'block';
  } else {
    document.getElementById('unverifiedBanner').style.display = 'none';
  }

  // Profile data
  targetUid = profileUid || user.uid;
  const profile = await getUserProfile(targetUid);
  const name = profile?.username || user.displayName || 'Seniman';
  document.getElementById('profileName').textContent = name;
  const avatarEl = document.getElementById('profileAvatar');

  if (profile?.avatar) {
    avatarEl.innerHTML = `<img src="${profile.avatar}" />`;
  } else {
    avatarEl.textContent = name.charAt(0).toUpperCase();
  }
  document.getElementById('profileBio').textContent = profile?.bio || 'Belum ada bio.';
  document.getElementById('editBio').value = profile?.bio || '';
  document.getElementById('artworkCount').textContent = profile?.artworkCount || 0;
  document.getElementById('myArtGrid').innerHTML = '<span class="loader"></span>';

// Load artworks (KARYA SENDIRI)
const artworks = await fetchUserArtworks(targetUid);
renderArtGrid(artworks, document.getElementById('myArtGrid'));
  document.getElementById('artworkCount').textContent = artworks.length;
});

async function uploadToCloudinary(file) {
  const url = `https://api.cloudinary.com/v1_1/dwoyzgfxh/image/upload`;

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', 'artlocal_avatar');

  const res = await fetch(url, {
    method: 'POST',
    body: formData
  });

  const data = await res.json();
  return data.secure_url;
}

avatarInput.onchange = async () => {
  const file = avatarInput.files[0];
  if (!file) return;

  avatar.innerHTML = '⏳';

  try {
    const imageUrl = await uploadToCloudinary(file);

    // 🔥 simpan ke firestore
    await setDoc(doc(db, 'users', currentUser.uid), {
      avatar: imageUrl
    }, { merge: true });

    // 🔥 tampilkan langsung
    avatar.innerHTML = `<img src="${imageUrl}" />`;

    showToast('Avatar berhasil diupdate!', 'success');
  } catch (e) {
    console.error(e);
    showToast('Upload gagal 😢', 'error');
  }
};

async function loadLikedArtworks(uid) {
  const q = query(
    collection(db, 'likes'),
    where('userId', '==', uid)
  );

  const snap = await getDocs(q);

  const artworkIds = [];

  snap.forEach(doc => {
    artworkIds.push(doc.data().artworkId);
  });

  if (artworkIds.length === 0) {
    document.getElementById('myArtGrid').innerHTML = `
      <p style="text-align:center;color:gray">Belum ada yang di-like 😢</p>
    `;
    return;
  }

  // 🔥 INI YANG BENAR (fetch per ID)
  const artworks = await Promise.all(
    artworkIds.map(id =>
      fetchArtwork(id).catch(() => null)
    )
  );

  renderArtGrid(
    artworks.filter(Boolean),
    document.getElementById('myArtGrid')
  );
}


const tabMyArt = document.getElementById('tabMyArt');
const tabLiked = document.getElementById('tabLiked');

tabLiked.onclick = async () => {
  if (!targetUid) return; // 🔥 penting

  tabLiked.style.opacity = '1';
  tabMyArt.style.opacity = '0.5';

  document.getElementById('myArtGrid').innerHTML = '<span class="loader"></span>';

  await loadLikedArtworks(targetUid);
};

tabMyArt.onclick = async () => {
  if (!targetUid) return;

  tabMyArt.style.opacity = '1';
  tabLiked.style.opacity = '0.5';

  document.getElementById('myArtGrid').innerHTML = '<span class="loader"></span>';

  const artworks = await fetchUserArtworks(targetUid);
  renderArtGrid(artworks, document.getElementById('myArtGrid'));
};

window.handleLogout = async () => {
  await logoutUser();
  window.location.href = 'index.html';
};

window.toggleEdit = () => {
  const form = document.getElementById('editForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
};

window.saveBio = async () => {
  if (!currentUser) return;
  const bio = document.getElementById('editBio').value.trim();
  try {
    await setDoc(doc(db, 'users', currentUser.uid), { bio }, { merge: true });
    document.getElementById('profileBio').textContent = bio || 'Belum ada bio.';
    window.toggleEdit();
    showToast('Bio berhasil diperbarui!', 'success');
  } catch (e) {
    showToast('Gagal menyimpan bio.', 'error');
  }
};

function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

window.resendVerificationEmailClick = async () => {
  try {
    await resendVerificationEmail();
    showToast('Email verifikasi sudah dikirim! Cek inbox kamu.', 'success');
  } catch (e) {
    showToast('Gagal mengirim email verifikasi.', 'error');
  }
};
</script>
</body>
</html>
